<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault Pro // Command Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root {
            --bg-deep: #000000;
            --bg-surface: #090909;
            --bg-card: #111111;
            --bg-hover: #161616;
            --accent: #1db954;
            --text-main: #ffffff;
            --text-dim: #6a6a6a;
            --text-bright: #b3b3b3;
            --border: #181818;
            --border-heavy: #282828;
            --player-height: 90px;
            --sidebar-width: 380px;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            letter-spacing: -0.01em;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: #282828; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3e3e3e; }

        #app-shell { display: flex; flex: 1; overflow: hidden; }

        #main-view {
            flex: 1;
            background: linear-gradient(to bottom, #121212 0%, var(--bg-deep) 100%);
            overflow-y: auto;
            padding: 35px;
            border-right: 1px solid var(--border);
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .search-bar {
            background: #1a1a1a;
            border: 1px solid transparent;
            color: #fff;
            padding: 12px 16px;
            font-family: inherit;
            font-size: 13px;
            width: 280px;
            border-radius: 500px;
            outline: none;
            transition: all 0.2s;
        }
        .search-bar:focus { border-color: var(--border-heavy); background: #222; }

        select.search-bar { width: 140px; cursor: pointer; appearance: none; }

        .action-btn {
            background: #fff;
            border: none;
            color: #000;
            padding: 12px 24px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 500px;
            transition: all 0.2s ease;
        }
        .action-btn:hover { transform: scale(1.04); background: #f0f0f0; }

        #upload-status {
            display: none;
            align-items: center;
            gap: 12px;
            background: #161616;
            border: 1px solid var(--border-heavy);
            padding: 8px 18px;
            border-radius: 500px;
        }
        #load-text { font-size: 11px; font-weight: 600; font-family: monospace; color: var(--accent); white-space: nowrap; }
        .load-track { width: 100px; height: 4px; background: #000; border-radius: 2px; overflow: hidden; }
        #load-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.1s linear; }

        #album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 25px;
            align-items: start;
        }

        .album-card {
            background: var(--bg-card);
            padding: 15px;
            border: 1px solid transparent;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.3s ease;
        }
        .album-card:hover { background: var(--bg-hover); }
        .album-card.active { background: #1c1c1c; }

        .cover-wrapper {
            width: 100%;
            aspect-ratio: 1/1;
            margin-bottom: 15px;
            background: #1e1e1e;
            overflow: hidden;
            border-radius: 4px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #333;
            position: relative;
        }

        .cover-img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }

        .title { font-weight: 700; font-size: 14px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .artist { color: var(--text-dim); font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .drawer {
            grid-column: 1 / -1;
            background: #111;
            margin: 15px 0 30px 0;
            padding: 30px;
            display: flex;
            gap: 40px;
            border-radius: 8px;
            animation: fadeIn 0.3s ease;
        }

        .drawer-left { width: 180px; flex-shrink: 0; }
        .drawer-right { flex: 1; overflow: hidden; }
        .drawer-cover { width: 180px; height: 180px; border-radius: 4px; box-shadow: 0 12px 24px rgba(0,0,0,0.6); object-fit: cover; }
        .drawer-cover-placeholder {
            width: 180px; height: 180px; border-radius: 4px;
            background: #1a1a1a; display: flex;
            align-items: center; justify-content: center; font-size: 48px;
        }

        .track-columns {
            column-count: 2;
            column-gap: 40px;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .track-item {
            break-inside: avoid;
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-bright);
            transition: background 0.1s;
        }
        .track-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .track-item.playing-track { color: var(--accent); }
        .track-num { width: 30px; color: var(--text-dim); font-weight: 600; font-family: monospace; }
        .track-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
        .track-length { width: 45px; text-align: right; color: var(--text-dim); font-family: monospace; }

        #info-panel {
            width: var(--sidebar-width);
            background: var(--bg-deep);
            padding: 35px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            border-left: 1px solid var(--border);
        }

        .panel-headline { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); font-weight: 700; margin-bottom: 25px; }
        .empty-signal { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 13px; font-weight: 500; text-align: center; }

        .meta-grid { margin-top: 30px; display: grid; grid-template-columns: 80px 1fr; gap: 15px; font-size: 12px; line-height: 1.5; }
        .meta-label { color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; font-size: 11px; }
        .meta-val { color: #fff; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #art-indicator {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.7); color: var(--accent);
            font-size: 9px; font-weight: 900; padding: 4px 8px;
            border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px;
            border: 1px solid var(--accent); display: none; pointer-events: none;
        }

        #player {
            height: var(--player-height);
            background: #000;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 35px;
            position: relative;
        }

        .playback-engine { flex: 1; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
        .main-controls { display: flex; align-items: center; gap: 20px; margin-bottom: 6px; }

        .btn-icon { background: none; border: none; color: var(--text-bright); font-size: 16px; cursor: pointer; padding: 10px; border-radius: 50%; transition: 0.1s; }
        .btn-icon:hover { color: #fff; transform: scale(1.05); }
        .btn-active { color: var(--accent) !important; }
        #play-toggle { font-size: 28px; color: #fff; }

        .scrubber-row { width: 100%; display: flex; align-items: center; gap: 12px; font-size: 11px; font-family: monospace; color: var(--text-dim); }

        input[type="range"] { -webkit-appearance: none; flex: 1; background: #282828; height: 4px; border-radius: 2px; outline: none; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #fff; transition: transform 0.1s ease; }
        input[type="range"]:hover::-webkit-slider-thumb { transform: scale(1.2); }

        #mini-player { display: flex; align-items: center; gap: 12px; position: absolute; left: 35px; max-width: 250px; overflow: hidden; }
        #mini-art { width: 44px; height: 44px; border-radius: 4px; object-fit: cover; background: #181818; display: none; }
        #mini-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        #mini-title { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 2px; }
        #mini-artist { font-size: 11px; color: var(--text-dim); font-weight: 500; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body ondragover="event.preventDefault()" ondrop="handleDrop(event)">

<div id="app-shell">
    <main id="main-view">
        <div class="header-row">
            <div>
                <h1 style="font-size:26px;font-weight:800;margin:0 0 5px 0;">Archive Grid</h1>
                <p style="color:var(--text-dim);font-size:13px;margin:0;font-weight:500;">Archive visualizer and local file management.</p>
            </div>
            <div style="display:flex;gap:15px;align-items:center;">
                <div id="upload-status">
                    <span id="load-text">0/0 loaded</span>
                    <div class="load-track"><div id="load-bar"></div></div>
                </div>
                <input type="text" class="search-bar" id="search-input" placeholder="Search archive..." oninput="filterGrid()">
                <select id="sort-select" class="search-bar" onchange="drawGrid()">
                    <option value="added">Sort: Date Added</option>
                    <option value="title">Sort: Title (A-Z)</option>
                    <option value="artist">Sort: Artist (A-Z)</option>
                </select>
                <button class="action-btn" onclick="document.getElementById('folder-picker').click()">Load Folder</button>
                <input type="file" id="folder-picker" webkitdirectory directory multiple style="display:none;" onchange="handleFolderSelect(event)">
            </div>
        </div>
        <div id="album-grid"></div>
    </main>

    <aside id="info-panel">
        <div class="panel-headline">Now Playing</div>
        <div id="panel-standby" class="empty-signal">Select a track to view archive metadata.</div>
        <div id="panel-active" style="display:none;">
            <div style="position:relative;">
                <img id="sp-art" style="width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:6px;box-shadow:0 12px 24px rgba(0,0,0,0.5);">
                <div id="art-indicator">No Embedded Art</div>
            </div>
            <h2 id="sp-title" style="margin:25px 0 4px 0;font-size:18px;font-weight:800;word-break:break-all;"></h2>
            <p id="sp-artist" style="color:var(--accent);font-size:13px;font-weight:600;margin:0;"></p>
            <div class="meta-grid">
                <div class="meta-label">Track</div><div class="meta-val" id="sp-track">—</div>
                <div class="meta-label">Album</div><div class="meta-val" id="sp-album">—</div>
                <div class="meta-label">Year</div><div class="meta-val" id="sp-year">—</div>
                <div class="meta-label">Composer</div><div class="meta-val" id="sp-composer">—</div>
                <div class="meta-label">Genre</div><div class="meta-val" id="sp-genre">—</div>
                <div class="meta-label">Encoding</div><div class="meta-val" id="sp-type">—</div>
            </div>
        </div>
    </aside>
</div>

<footer id="player">
    <div id="mini-player">
        <img id="mini-art">
        <div id="mini-text">
            <div id="mini-title"></div>
            <div id="mini-artist"></div>
        </div>
    </div>
    <div class="playback-engine">
        <div class="main-controls">
            <button class="btn-icon" id="shuffle-btn" onclick="toggleShuffle()">🔀</button>
            <button class="btn-icon" onclick="prev()">⏮</button>
            <button class="btn-icon" id="play-toggle" onclick="toggle()">▶️</button>
            <button class="btn-icon" onclick="next()">⏭</button>
            <button class="btn-icon" id="repeat-btn" onclick="toggleRepeat()">🔁</button>
        </div>
        <div class="scrubber-row">
            <span id="time-cur">00:00</span>
            <input type="range" id="seek-bar" value="0">
            <span id="time-total">00:00</span>
        </div>
    </div>
    <div style="width:130px;display:flex;align-items:center;gap:12px;position:absolute;right:35px;">
        <span style="font-size:12px;color:var(--text-dim);font-weight:700;">VOL</span>
        <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.7">
    </div>
</footer>

<audio id="core-audio"></audio>

<script>
    const audio = document.getElementById('core-audio');
    let library     = new Map();
    let activeQueue = [];
    let activeIdx   = -1;
    let activeAlbumKey = "";
    let isShuffle   = false;
    let isRepeat    = false;
    let activeTrackUid = "";

    // Correct MIME types — fixes m4a/mp4 playback where File.type can be wrong/empty
    const MIME_MAP = {
        mp3: 'audio/mpeg', flac: 'audio/flac',
        m4a: 'audio/mp4',  mp4:  'audio/mp4',
        aac: 'audio/aac',  wav:  'audio/wav',
        opus:'audio/ogg; codecs=opus', ogg: 'audio/ogg'
    };

    // Formats jsmediatags cannot read — skip tag parsing, use filename/folder instead
    const NO_TAG_FORMATS = /\.(opus|wav)$/i;

    function getExt(name) { return (name.split('.').pop() || '').toLowerCase(); }

    function createAudioURL(file) {
        const mime = MIME_MAP[getExt(file.name)] || file.type || 'audio/mpeg';
        return URL.createObjectURL(new Blob([file], { type: mime }));
    }

    // ── FILENAME PARSER ────────────────────────────────────────────────────────
    // Extracts { artist, title } from common naming patterns:
    //   "Artist - Title.opus"
    //   "01 - Artist - Title.opus"
    //   "01. Artist - Title.opus"
    function parseFilename(filename) {
        const bare = filename.replace(/\.[^/.]+$/, '').trim();
        const parts = bare.split(/\s+-\s+/);

        if (parts.length >= 2) {
            const first = parts[0].trim();
            // If first segment is a bare track number, skip it
            if (/^\d+\.?$/.test(first)) {
                if (parts.length >= 3) {
                    // "01 - Artist - Title"
                    return { artist: parts[1].trim(), title: parts.slice(2).join(' - ') };
                }
                // "01 - Title" — can't determine artist from filename
                return { artist: null, title: parts.slice(1).join(' - ') };
            }
            // "Artist - Title"
            return { artist: first, title: parts.slice(1).join(' - ') };
        }
        return { artist: null, title: bare };
    }

    // ── FALLBACK METADATA RESOLVER for opus/wav ────────────────────────────────
    // Priority chain for artist + album when tags are unreadable:
    //  1. Filename pattern "Artist - Title.opus"  → artist from filename
    //  2. Deep folder structure Artist/Album/file → grandparent=artist, parent=album
    //  3. Shallow structure    Artist/file        → parent folder = artist
    //  4. Flat (no path depth)                   → "Unknown Archive"
    function resolveNoTagMeta(file, fullPath) {
        const parts      = fullPath.split('/').filter(Boolean);
        const parent     = parts.length >= 2 ? parts[parts.length - 2] : null;
        const grandParent= parts.length >= 3 ? parts[parts.length - 3] : null;
        const parsed     = parseFilename(file.name);

        let artist, albumName, albumKey;

        if (parsed.artist) {
            // Filename tells us the artist directly — most reliable signal
            artist    = parsed.artist;
            albumName = artist + ' (.OPUS)';
            albumKey  = 'notag::' + albumName.toLowerCase();
        } else if (grandParent) {
            // Deep folder: Artist/Album/file.opus
            artist    = grandParent;
            albumName = parent;
            albumKey  = 'notag::' + albumName.toLowerCase();
        } else if (parent) {
            // Shallow: Artist/file.opus — treat the folder as artist grouping
            artist    = parent;
            albumName = parent + ' (.OPUS)';
            albumKey  = 'notag::' + albumName.toLowerCase();
        } else {
            artist    = 'Unknown Archive';
            albumName = 'Unknown Archive';
            albumKey  = 'notag::unknown-archive';
        }

        return { artist, albumName, albumKey };
    }

    // ──────────────────────────────────────────────────────────────────────────

    function showLoading(show) { document.getElementById('upload-status').style.display = show ? 'flex' : 'none'; }
    function updateLoading(loaded, total) {
        document.getElementById('load-text').innerText = `${loaded}/${total} loaded`;
        document.getElementById('load-bar').style.width = `${(loaded / total) * 100}%`;
    }

    async function handleFolderSelect(e) {
        const files = Array.from(e.target.files).filter(f => isMusic(f.name));
        if (!files.length) return;
        showLoading(true);
        let loaded = 0;
        for (const file of files) {
            await mapFile(file, file.webkitRelativePath);
            loaded++; updateLoading(loaded, files.length);
        }
        drawGrid();
        setTimeout(() => showLoading(false), 1500);
    }

    async function handleDrop(e) {
        e.preventDefault();
        showLoading(true);
        let allFiles = [];
        for (const item of e.dataTransfer.items) {
            const entry = item.webkitGetAsEntry();
            if (entry) await collectFiles(entry, allFiles);
        }
        let loaded = 0;
        for (const { file, path } of allFiles) {
            await mapFile(file, path);
            loaded++; updateLoading(loaded, allFiles.length);
        }
        drawGrid();
        setTimeout(() => showLoading(false), 1500);
    }

    async function collectFiles(entry, fileList) {
        if (entry.isFile && isMusic(entry.name)) {
            const file = await new Promise(r => entry.file(r));
            fileList.push({ file, path: entry.fullPath });
        } else if (entry.isDirectory) {
            const reader  = entry.createReader();
            const entries = await new Promise(r => reader.readEntries(r));
            for (const e of entries) await collectFiles(e, fileList);
        }
    }

    async function mapFile(file, fullPath) {

        // ── NO-TAG BRANCH: opus + wav ──────────────────────────────────────────
        if (NO_TAG_FORMATS.test(file.name)) {
            const { artist, albumName, albumKey } = resolveNoTagMeta(file, fullPath);
            if (!library.has(albumKey)) {
                library.set(albumKey, {
                    name: albumName, artist,
                    id: 'alb-' + Math.random().toString(36).slice(2, 9),
                    tracks: [], art: null,
                    dateAdded: Date.now(),
                    noTags: true
                });
            }
            library.get(albumKey).tracks.push(file);
            return;
        }

        // ── TAG BRANCH: mp3 / flac / m4a / aac / ogg / mp4 ───────────────────
        const parts        = fullPath.split('/').filter(Boolean);
        const folderAlbum  = parts.length >= 2 ? parts[parts.length - 2] : '.OPUS';
        const folderArtist = parts.length >= 3 ? parts[parts.length - 3] : null;

        const tags = await new Promise(r => {
            if (!window.jsmediatags) r({});
            else window.jsmediatags.read(file, { onSuccess: t => r(t.tags), onError: () => r({}) });
        });

        const rawAlbum = tags.album  ? tags.album.trim()
                       : tags.artist ? tags.artist.trim() + ' (.OPUS)'
                       : folderAlbum;
        const albumKey  = rawAlbum.toLowerCase();
        const artist    = tags.artist ? tags.artist.trim() : (folderArtist || folderAlbum);

        if (!library.has(albumKey)) {
            library.set(albumKey, {
                name: rawAlbum, artist,
                id: 'alb-' + Math.random().toString(36).slice(2, 9),
                tracks: [], art: null,
                dateAdded: Date.now(),
                noTags: false
            });
        }
        library.get(albumKey).tracks.push(file);
    }

    function isMusic(n) { return /\.(mp3|flac|m4a|mp4|aac|wav|opus|ogg)$/i.test(n); }

    function drawGrid() {
        const grid = document.getElementById('album-grid');
        grid.innerHTML = '';
        let albums = Array.from(library.entries());
        const sort = document.getElementById('sort-select').value;
        if      (sort === 'title')  albums.sort((a, b) => a[1].name.localeCompare(b[1].name));
        else if (sort === 'artist') albums.sort((a, b) => a[1].artist.localeCompare(b[1].artist));
        else                        albums.sort((a, b) => a[1].dateAdded - b[1].dateAdded);

        albums.forEach(([key, album]) => {
            // Sort no-tag albums by filename (numeric-aware so track02 < track10)
            if (album.noTags) {
                album.tracks.sort((a, b) =>
                    a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' })
                );
            }

            const card = document.createElement('div');
            card.className = 'album-card';
            card.id = album.id;
            card.innerHTML = `
                <div class="cover-wrapper">
                    <span id="placeholder-${album.id}"></span>
                    <img class="cover-img" id="img-${album.id}" style="display:none;">
                </div>
                <div class="title">${album.name}</div>
                <div class="artist">${album.artist}</div>
            `;
            if (album.art) {
                card.querySelector(`#img-${album.id}`).src = album.art;
                card.querySelector(`#img-${album.id}`).style.display = 'block';
                card.querySelector(`#placeholder-${album.id}`).style.display = 'none';
            }
            card.onclick = () => openDrawer(key, card);
            grid.appendChild(card);

            if (!album.art && !album.noTags && album.tracks.length > 0) {
                fetchGridArt(album.tracks[0], album);
            }
        });
        filterGrid();
    }

    function fetchGridArt(file, album) {
        jsmediatags.read(file, { onSuccess: t => {
            if (!t.tags.picture) return;
            const { data, format } = t.tags.picture;
            let b = ''; for (let i = 0; i < data.length; i++) b += String.fromCharCode(data[i]);
            album.art = `data:${format};base64,${window.btoa(b)}`;
            const img = document.getElementById('img-' + album.id);
            const ph  = document.getElementById('placeholder-' + album.id);
            if (img) { img.src = album.art; img.style.display = 'block'; }
            if (ph)  ph.style.display = 'none';
        }});
    }

    function filterGrid() {
        const q = document.getElementById('search-input').value.toLowerCase();
        document.querySelectorAll('.album-card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(q) ? 'block' : 'none';
        });
    }

    function openDrawer(albumKey, card) {
        const existing = document.querySelector('.drawer');
        const wasThis  = existing && existing.dataset.owner === albumKey;
        document.querySelectorAll('.album-card').forEach(c => c.classList.remove('active'));
        if (existing) existing.remove();
        if (wasThis) return;
        card.classList.add('active');
        const album = library.get(albumKey);

        const coverHtml = album.art
            ? `<img src="${album.art}" class="drawer-cover">`
            : `<div class="drawer-cover-placeholder"></div>`;

        const drawer = document.createElement('div');
        drawer.className = 'drawer';
        drawer.dataset.owner = albumKey;
        drawer.innerHTML = `
            <div class="drawer-left">${coverHtml}</div>
            <div class="drawer-right">
                <h2 style="margin:0 0 4px 0;">${album.name}</h2>
                <p style="color:var(--text-dim);margin:0 0 20px 0;">${album.artist}</p>
                <ul class="track-columns">
                    ${album.tracks.map((t, i) => `
                        <li class="track-item ${album.id + '-' + i === activeTrackUid ? 'playing-track' : ''}"
                            data-uid="${album.id + '-' + i}"
                            onclick="ignite('${albumKey}', ${i})">
                            <span class="track-num">${String(i + 1).padStart(2, '0')}</span>
                            <span class="track-name">${t.name.replace(/\.[^/.]+$/, '')}</span>
                            <span class="track-length" id="dur-${album.id + '-' + i}">--:--</span>
                        </li>`).join('')}
                </ul>
            </div>`;

        let target = card;
        while (target.nextElementSibling && target.nextElementSibling.offsetTop === card.offsetTop) {
            target = target.nextElementSibling;
        }
        target.after(drawer);

        album.tracks.forEach((t, i) => {
            const tmp = new Audio();
            tmp.src = createAudioURL(t);
            tmp.onloadedmetadata = () => {
                const el = document.getElementById(`dur-${album.id}-${i}`);
                if (el) el.innerText = fmt(tmp.duration);
                URL.revokeObjectURL(tmp.src);
            };
            tmp.onerror = () => URL.revokeObjectURL(tmp.src);
        });
    }

    function ignite(albumKey, idx) {
        activeAlbumKey = albumKey;
        const album = library.get(albumKey);
        activeQueue = [...album.tracks];
        activeIdx   = idx;
        if (isShuffle) {
            activeQueue = activeQueue.sort(() => Math.random() - 0.5);
            activeIdx   = activeQueue.indexOf(album.tracks[idx]);
        }
        activeTrackUid = `${album.id}-${idx}`;
        document.querySelectorAll('.track-item').forEach(el => el.classList.remove('playing-track'));
        const listEl = document.querySelector(`[data-uid="${activeTrackUid}"]`);
        if (listEl) listEl.classList.add('playing-track');
        loadTrack();
    }

    function loadTrack() {
        const file  = activeQueue[activeIdx];
        const album = library.get(activeAlbumKey);

        if (audio._blobURL) URL.revokeObjectURL(audio._blobURL);
        audio._blobURL = createAudioURL(file);
        audio.src = audio._blobURL;
        audio.play().catch(() => {});

        document.getElementById('play-toggle').innerText = '⏸';
        document.getElementById('panel-standby').style.display = 'none';
        document.getElementById('panel-active').style.display  = 'block';

        const fallbackTitle = file.name.replace(/\.[^/.]+$/, '');
        document.getElementById('sp-type').innerText = getExt(file.name).toUpperCase();

        // ── No-tag path: derive all sidebar info from filename + album object ──
        if (NO_TAG_FORMATS.test(file.name)) {
            const parsed = parseFilename(file.name);
            document.getElementById('sp-title').innerText    = parsed.title || fallbackTitle;
            document.getElementById('sp-artist').innerText   = album.artist;
            document.getElementById('sp-album').innerText    = album.name;
            document.getElementById('sp-track').innerText    = String(activeIdx + 1);
            document.getElementById('sp-year').innerText     = '—';
            document.getElementById('sp-composer').innerText = '—';
            document.getElementById('sp-genre').innerText    = '—';
            document.getElementById('mini-title').innerText  = parsed.title || fallbackTitle;
            document.getElementById('mini-artist').innerText = album.artist;
            document.getElementById('sp-art').src            = '';
            document.getElementById('mini-art').style.display = 'none';
            document.getElementById('art-indicator').style.display = 'block';
            return;
        }

        // ── Tag path ────────────────────────────────────────────────────────────
        document.getElementById('sp-title').innerText  = fallbackTitle;
        document.getElementById('sp-artist').innerText = 'Loading...';
        document.getElementById('sp-art').src          = album.art || '';
        document.getElementById('mini-art').src        = album.art || '';
        document.getElementById('mini-art').style.display = album.art ? 'block' : 'none';
        document.getElementById('art-indicator').style.display = 'block';

        jsmediatags.read(file, {
            onSuccess: t => {
                const tags = t.tags || {};
                document.getElementById('sp-title').innerText    = tags.title    || fallbackTitle;
                document.getElementById('sp-artist').innerText   = tags.artist   || album.artist;
                document.getElementById('mini-title').innerText  = tags.title    || fallbackTitle;
                document.getElementById('mini-artist').innerText = tags.artist   || album.artist;
                document.getElementById('sp-album').innerText    = tags.album    || album.name || '—';
                document.getElementById('sp-genre').innerText    = tags.genre    || '—';
                document.getElementById('sp-year').innerText     = tags.year     || tags.TDRC?.data || tags['©day']?.data || '—';
                document.getElementById('sp-track').innerText    = tags.track    || '—';
                document.getElementById('sp-composer').innerText = tags.composer || tags['©wrt']?.data || '—';

                if (tags.picture) {
                    const { data, format } = tags.picture;
                    let b = ''; for (let i = 0; i < data.length; i++) b += String.fromCharCode(data[i]);
                    const art = `data:${format};base64,${window.btoa(b)}`;
                    document.getElementById('sp-art').src = art;
                    document.getElementById('mini-art').src = art;
                    document.getElementById('mini-art').style.display = 'block';
                    document.getElementById('art-indicator').style.display = 'none';
                }
            },
            onError: () => {
                document.getElementById('sp-artist').innerText   = album.artist;
                document.getElementById('mini-artist').innerText = album.artist;
            }
        });
    }

    function toggle() {
        if (audio.paused) { audio.play(); document.getElementById('play-toggle').innerText = '⏸'; }
        else              { audio.pause(); document.getElementById('play-toggle').innerText = '▶️'; }
    }
    function next() { if (activeIdx < activeQueue.length - 1) { activeIdx++; loadTrack(); } }
    function prev() { if (activeIdx > 0)                      { activeIdx--; loadTrack(); } }
    function toggleShuffle() { isShuffle = !isShuffle; document.getElementById('shuffle-btn').classList.toggle('btn-active', isShuffle); }
    function toggleRepeat()  { isRepeat  = !isRepeat;  document.getElementById('repeat-btn').classList.toggle('btn-active', isRepeat); }
    const fmt = s => isNaN(s) ? '00:00' : `${String(Math.floor(s/60)).padStart(2,'0')}:${String(Math.floor(s%60)).padStart(2,'0')}`;

    audio.ontimeupdate = () => {
        document.getElementById('seek-bar').max   = audio.duration || 0;
        document.getElementById('seek-bar').value = audio.currentTime;
        document.getElementById('time-cur').innerText   = fmt(audio.currentTime);
        document.getElementById('time-total').innerText = fmt(audio.duration);
    };
    document.getElementById('seek-bar').oninput   = e => audio.currentTime = e.target.value;
    document.getElementById('vol-slider').oninput  = e => audio.volume = e.target.value;
    audio.onended = () => { if (isRepeat) { audio.currentTime = 0; audio.play(); } else next(); };
    window.addEventListener('keydown', e => {
        if (e.code === 'Space' && e.target.tagName !== 'INPUT') { e.preventDefault(); toggle(); }
    });
</script>
</body>
</html>
